services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg-sqlserver
    environment:
      SA_PASSWORD: "FCG@Pass123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "FCG@Pass123", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcg-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  usuarios-api:
    image: carolinadso/fcg-usuarios-api:latest
    container_name: fcg-usuarios-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=fcg-sqlserver;Database=FCG_Usuarios;User Id=sa;Password=FCG@Pass123;TrustServerCertificate=True"
      RabbitMQ__Host: "fcg-rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Usuario: "guest"
      RabbitMQ__Senha: "guest"
    ports:
      - "5101:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  catalogo-api:
    image: carolinadso/fcg-catalogo-api:latest
    container_name: fcg-catalogo-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=fcg-sqlserver;Database=FCG_Catalogo;User Id=sa;Password=FCG@Pass123;TrustServerCertificate=True"
      RabbitMQ__Host: "fcg-rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Usuario: "guest"
      RabbitMQ__Senha: "guest"
    ports:
      - "5133:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  pagamentos-worker:
    image: carolinadso/fcg-pagamentos-worker:latest
    container_name: fcg-pagamentos-worker
    environment:
      DOTNET_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=fcg-sqlserver;Database=FCG_Pagamentos;User Id=sa;Password=FCG@Pass123;TrustServerCertificate=True"
      RabbitMQ__Host: "fcg-rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Usuario: "guest"
      RabbitMQ__Senha: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notificacoes-worker:
    image: carolinadso/fcg-notificacoes-worker:latest
    container_name: fcg-notificacoes-worker
    environment:
      DOTNET_ENVIRONMENT: "Development"
      RabbitMQ__Host: "fcg-rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Usuario: "guest"
      RabbitMQ__Senha: "guest"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
  rabbitmq_data: